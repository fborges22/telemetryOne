worker_processes auto;

events {
  worker_connections 1024;
}

stream {
  resolver 127.0.0.11 ipv6=off;

  upstream otlp_grpc_backend {
    zone otlp_grpc_backend 64k;
    server otel-collector:4317 resolve;
  }

  server {
    listen 4317 ssl;
    proxy_pass otlp_grpc_backend;

    ssl_certificate /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/key.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_session_cache shared:SSL_STREAM:10m;
    ssl_session_timeout 1h;
  }
}

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;

  resolver 127.0.0.11 ipv6=off;
  sendfile on;
  keepalive_timeout 65;
  server_tokens off;

  map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
  }

  upstream grafana_backend {
    zone grafana_backend 64k;
    server grafana:3000 resolve;
  }

  upstream jaeger_backend {
    zone jaeger_backend 64k;
    server jaeger:16686 resolve;
  }

  upstream loki_backend {
    zone loki_backend 64k;
    server loki:3100 resolve;
  }

  upstream otlp_http_backend {
    zone otlp_http_backend 64k;
    server otel-collector:4318 resolve;
  }

  upstream prometheus_backend {
    zone prometheus_backend 64k;
    server prometheus:9090 resolve;
  }

  server {
    listen 80;
    server_name _;

    return 301 https://$host$request_uri;
  }

  server {
    listen 443 ssl;
    http2 on;
    server_name _;

    ssl_certificate /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/key.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_session_cache shared:SSL_HTTPS:10m;
    ssl_session_timeout 1h;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header Referrer-Policy same-origin always;

    location = / {
      return 302 /grafana/;
    }

    location = /grafana {
      return 301 /grafana/;
    }

    location = /jaeger {
      return 301 /jaeger/;
    }

    location = /prometheus {
      return 301 /prometheus/;
    }

    location /grafana/ {
      proxy_pass http://grafana_backend;
      proxy_http_version 1.1;
      proxy_set_header Connection $connection_upgrade;
      proxy_set_header Host $host;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Host $host;
      proxy_set_header X-Forwarded-Proto https;
    }

    location /jaeger/ {
      proxy_pass http://jaeger_backend;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Host $host;
      proxy_set_header X-Forwarded-Proto https;
    }

    location /loki/ {
      proxy_pass http://loki_backend;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Host $host;
      proxy_set_header X-Forwarded-Proto https;
    }

    location /prometheus/ {
      proxy_pass http://prometheus_backend;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Host $host;
      proxy_set_header X-Forwarded-Proto https;
    }
  }

  server {
    listen 4318 ssl;
    http2 on;
    server_name _;

    ssl_certificate /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/key.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_session_cache shared:SSL_OTLP_HTTP:10m;
    ssl_session_timeout 1h;

    location / {
      proxy_pass http://otlp_http_backend;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Host $host;
      proxy_set_header X-Forwarded-Proto https;
    }
  }
}
